<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>4L Team - Painel</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#D32F2F">
    <link rel="stylesheet" href="style.css">
</head>
<body style="align-items: flex-start; padding-top: 20px;">

    <div class="painel-container" style="width: 90%; max-width: 400px; margin: 0 auto;">
        
        <header style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
            <h2 style="color: white; font-size: 20px;">🥋 4L Team</h2>
            <button id="btn-sair" style="width: auto; padding: 8px 15px; background-color: #333; font-size: 14px;">Sair</button>
        </header>
        <h3 id="saudacao-aluno" style="color: white; margin-bottom: 25px; font-weight: normal;">Carregando...</h3>

                <div class="card-status" style="background-color: #1e1e1e; padding: 25px; border-radius: 15px; border-left: 6px solid #D32F2F; box-shadow: 0 4px 15px rgba(0,0,0,0.3);" id="cartao-fundo">
            <p style="color: #aaaaaa; margin-bottom: 8px; font-size: 14px; text-transform: uppercase; letter-spacing: 1px;">Mensalidade Atual</p>
            
            <h3 id="mes-atual" style="color: white; margin-bottom: 20px; font-size: 22px;">Buscando...</h3>
            
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <span id="status-pagamento" style="color: #ff5252; font-weight: bold; font-size: 18px;">Buscando...</span>
                
                <span id="valor-pagamento" style="color: white; font-size: 20px; font-weight: bold;">...</span>
            </div>

            <button id="btn-pagar">Gerar PIX de Pagamento</button>
        </div>


    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="painel.js"></script>
</body>
</html>
