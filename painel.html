<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>4L Academy - Aluno</title>
    <meta name="theme-color" content="#000000">
    <link rel="stylesheet" href="style.css?v=32">
    <script src="https://sdk.mercadopago.com/js/v2"></script>
</head>
<body style="padding-bottom: 30px;">

    <div class="banner-aluno"></div>
    <div id="menu-backdrop" class="menu-backdrop" onclick="fecharMenu()"></div>

    <div id="menu-lateral" class="menu-lateral">
        <div class="menu-header">
            <div style="display: flex; align-items: center; gap: 8px;">
                <span style="color: var(--cor-destaque); font-size: 20px;">🔺</span>
                <h2 style="font-style: italic; font-size: 22px; margin: 0; color: white;">4L <span style="color: var(--cor-destaque);">ACADEMY</span></h2>
            </div>
            <button onclick="fecharMenu()" style="background:none; border:none; color:white; font-size:24px; width:auto; padding:0; cursor:pointer;">✕</button>
        </div>
        <p style="color: #aaaaaa; font-size: 11px; margin-bottom: 25px; padding: 0 20px;">Portal Exclusivo do Aluno</p>
        
        <div class="menu-items">
            <div class="menu-item active" onclick="trocarAbaAluno('aba-mensalidade', this)">💳 Financeiro</div>
            <div class="menu-item" onclick="trocarAbaAluno('aba-avisos', this)">📢 Mural de Avisos</div>
            
            <p style="color: #444; font-size: 10px; margin: 25px 20px 10px; text-transform: uppercase; font-weight: bold;">Em Breve</p>
            <div class="menu-item disabled">📈 Linha do Tempo</div>
            <div class="menu-item disabled">🥋 Exames & Graduação</div>
            
            <div style="margin-top: auto; border-top: 1px solid var(--cor-borda); padding-top: 15px;">
                <div class="menu-item" onclick="document.getElementById('btn-sair').click()" style="color: #E53935;">🚪 Sair da Conta</div>
            </div>
        </div>
    </div>

    <div class="painel-container" style="width: 90%; max-width: 400px; margin: 0 auto; position: relative; z-index: 10; padding-top: 20px;">
        
        <header style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <button onclick="abrirMenu()" style="background:none; border:none; color:white; font-size:24px; width:auto; padding:0; cursor:pointer;">☰</button>
            <div style="display: flex; align-items: center; gap: 8px;">
                <span style="color: var(--cor-destaque); font-size: 18px;">🔺</span>
                <h2 style="font-style: italic; font-size: 18px; margin: 0; color: white;">4L <span style="color: var(--cor-destaque);">ACADEMY</span></h2>
            </div>
            <button style="background:none; border:none; color:white; font-size:20px; width:auto; padding:0;">🔔</button>
        </header>

        <h3 id="saudacao-aluno" style="color: white; margin-bottom: 5px; font-weight: normal; text-align: left; font-size: 20px;">Carregando...</h3>

        <section id="aba-mensalidade" class="secao-admin">
            <div class="card-status" id="cartao-fundo" style="text-align: left; padding: 25px; background-color: rgba(22, 22, 24, 0.85);">
                <p style="color: #aaaaaa; margin-bottom: 8px; font-size: 12px; text-transform: uppercase;">Mensalidade Atual</p>
                <h3 id="mes-atual" style="color: white; margin-bottom: 20px; font-size: 22px;">Buscando...</h3>
                
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px;">
                    <span id="status-pagamento" style="font-weight: bold; font-size: 16px;">---</span>
                    <span id="valor-pagamento" style="color: white; font-weight: 800; font-size: 22px;">R$ 0,00</span>
                </div>

                <div id="opcoes-pagamento" style="display: none; flex-direction: column; gap: 10px;">
                    <button id="btn-pagar" style="background-color: #009ee3; color: white;">⚡ PAGAR COM PIX</button>
                    <button id="btn-show-card" style="background-color: #ffffff; color: #000;">💳 CARTÃO DE CRÉDITO</button>
                </div>

                <div id="cardPaymentBrick_container" style="margin-top: 20px;"></div>
                
                <div id="feedback-pix" style="color: #ffffff; margin-top: 15px; text-align: center; font-size: 14px;"></div>
            </div>
        </section>

        <section id="aba-avisos" class="secao-admin" style="display: none;">
            <h3 style="margin-bottom: 20px; font-size: 18px; color: white;">📢 AVISOS</h3>
            <div id="lista-avisos"></div>
        </section>

        <button id="btn-sair" style="display: none;"></button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="painel.js?v=32"></script>
</body>
</html>
