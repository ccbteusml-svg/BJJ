<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>4L Academy - Admin</title>
    <meta name="theme-color" content="#000000">
    <link rel="stylesheet" href="style.css?v=14">
</head>
<body style="padding-top: 20px; padding-bottom: 40px;">

    <div class="painel-container" style="width: 90%; max-width: 400px; margin: 0 auto; display: flex; flex-direction: column;">
        
        <header style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px;">
            <div style="display: flex; align-items: center; gap: 8px;">
                <span style="color: var(--cor-destaque); font-size: 20px;">🔺</span>
                <h2 style="font-style: italic; font-size: 22px; margin: 0;">4L <span style="color: var(--cor-destaque);">ACADEMY</span></h2>
            </div>
            <button id="btn-sair" style="width: auto; padding: 5px 10px; font-size: 13px; font-weight: bold; margin: 0;">Sair</button>
        </header>

        <div class="card-status" style="margin-bottom: 20px; text-align: left; padding: 20px;">
            <h3 style="margin-bottom: 15px; font-size: 16px;">📅 Gerar Mensalidades</h3>
            <input type="text" id="mes-geral" placeholder="Mês (Ex: Junho / 2026)" required>
            <input type="number" id="valor-geral" placeholder="Valor (Ex: 150)" value="150" required>
            <button id="btn-gerar-mes" style="background-color: transparent; border: 2px solid var(--cor-destaque); color: white;">⚡ GERAR COBRANÇAS</button>
            <p id="msg-gerador" style="color: #4CAF50; margin-top: 10px; font-size: 13px; text-align: center; height: 15px;"></p>
        </div>

        <div class="card-status" style="margin-bottom: 25px; text-align: left; padding: 20px;">
            <h3 style="margin-bottom: 15px; font-size: 16px;">➕ Novo Aluno</h3>
            <form id="form-novo-aluno">
                <input type="text" id="novo-nome" placeholder="Nome Completo" required>
                <input type="email" id="novo-email" placeholder="E-mail de Login" required>
                <input type="text" id="novo-senha" placeholder="Senha Inicial (Ex: 123456)" required>
                <input type="text" id="novo-faixa" placeholder="Faixa (Ex: Branca, Azul)" required>
                <button type="submit" id="btn-salvar-aluno" style="background-color: transparent; border: 2px solid var(--cor-destaque); color: white;">💾 SALVAR ALUNO</button>
                <p id="msg-cadastro" style="color: #4CAF50; margin-top: 10px; font-size: 13px; text-align: center; height: 15px;"></p>
            </form>
        </div>

        <h3 style="margin-bottom: 15px; font-size: 18px; border-bottom: 1px solid #333; padding-bottom: 10px;">🔴 Em Aberto</h3>
        <div id="lista-pendentes" style="width: 100%;">
            <p style="color: #aaaaaa; text-align: center; margin-top: 20px;">Buscando alunos...</p>
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="admin.js?v=14"></script>
</body>
</html>
