<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>4L Team - Painel do Professor</title>
    <meta name="theme-color" content="#0f1115">
    <link rel="stylesheet" href="style.css">
</head>
<body style="align-items: flex-start; padding-top: 20px;">

    <div class="painel-container" style="width: 90%; max-width: 400px; margin: 0 auto; display: flex; flex-direction: column; align-items: center;">
        
        <header style="width: 100%; display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h2 style="color: white; font-size: 20px;">🥋 Painel Admin</h2>
            <button id="btn-sair" style="width: auto; padding: 8px 15px; font-size: 14px;">Sair</button>
        </header>

        <div style="background-color: #1c1f26; padding: 20px; border-radius: 12px; width: 100%; margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.08);">
            <h3 style="color: white; margin-bottom: 15px; font-size: 16px; text-align: center;">📅 Gerar Mensalidade (Todos)</h3>
            
            <div style="display: flex; flex-direction: column;">
                <input type="text" id="mes-geral" placeholder="Mês (Ex: Junho / 2026)" required style="padding: 12px; margin-bottom: 10px;">
                <input type="number" id="valor-geral" placeholder="Valor (Ex: 150)" value="150" required style="padding: 12px; margin-bottom: 15px;">
                
                <button id="btn-gerar-mes" style="background-color: #f59e0b; color: white; padding: 12px; font-size: 15px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 15px rgba(245, 158, 11, 0.3);">⚡ Gerar Cobranças</button>
                <p id="msg-gerador" style="color: #4CAF50; margin-top: 10px; font-size: 13px; text-align: center; height: 15px;"></p>
            </div>
        </div>

        <div style="background-color: #1c1f26; padding: 20px; border-radius: 12px; width: 100%; margin-bottom: 30px; border: 1px solid rgba(255,255,255,0.08);">
            <h3 style="color: white; margin-bottom: 15px; font-size: 16px; text-align: center;">➕ Cadastrar Novo Aluno</h3>
            
            <form id="form-novo-aluno" style="display: flex; flex-direction: column;">
                <input type="text" id="novo-nome" placeholder="Nome Completo" required style="padding: 12px; margin-bottom: 10px;">
                <input type="email" id="novo-email" placeholder="E-mail de Login" required style="padding: 12px; margin-bottom: 10px;">
                <input type="text" id="novo-senha" placeholder="Senha Inicial (Ex: 123456)" required style="padding: 12px; margin-bottom: 10px;">
                <input type="text" id="novo-faixa" placeholder="Faixa (Ex: Branca, Azul)" required style="padding: 12px; margin-bottom: 15px;">
                
                <button type="submit" id="btn-salvar-aluno" style="background-color: #3b82f6; padding: 12px; border: none; border-radius: 12px; color: white; font-weight: bold; font-size: 15px; cursor: pointer;">💾 Salvar Aluno</button>
                <p id="msg-cadastro" style="color: #4CAF50; margin-top: 10px; font-size: 13px; text-align: center; height: 15px;"></p>
            </form>
        </div>

        <h3 style="color: white; margin-bottom: 20px; text-align: center; width: 100%; border-bottom: 1px solid #333; padding-bottom: 10px;">
            🔴 Mensalidades Pendentes
        </h3>

        <div id="lista-pendentes" style="width: 100%;">
            <p style="color: #aaaaaa; text-align: center; margin-top: 20px;">Buscando alunos...</p>
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="admin.js?v=3"></script>
</body>
</html>
