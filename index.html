<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>4L Academy - Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000000">
    
    <link rel="stylesheet" href="style.css?v=10">
</head>
<body>

    <div class="banner-topo"></div>

    <div class="login-container">
        <h1 style="font-style: italic;">4L <span style="color: #E53935;">ACADEMY</span></h1>
        <p class="subtitulo" style="font-size: 11px;">Jiu-Jitsu</p>
        
        <form id="form-login">
            
            <p style="margin-top: 20px; font-size: 13px; color: #aaaaaa;">
                Não tem uma conta? <a href="cadastro.html" style="color: var(--cor-destaque); text-decoration: none; font-weight: bold;">Cadastre-se aqui</a>
            </p>

            <input type="email" id="email" placeholder="Seu E-mail" required>
            <input type="password" id="senha" placeholder="Sua Senha" required>
            <button type="submit">Entrar</button>
            <p id="msg-erro" style="color: #E53935; margin-top: 15px; font-size: 14px; font-weight: bold; height: 20px;"></p>
            <p id="btn-esqueci-senha" style="margin-top: 15px; font-size: 13px; color: var(--cor-destaque); cursor: pointer; font-weight: bold;">
                Esqueci minha senha
            </p>
            
            <div class="social-footer">
                <p class="social-title">Nossas Redes Sociais e Contato</p>
                
                <div class="social-icons">
                    <a href="https://www.instagram.com/4l_teamjj?igsh=MTZqZWF3eXB5YjBrNw%3D%3D&utm_source=qr" target="_blank" class="icon-metal">
                        <i class="fab fa-instagram"></i>
                    </a>
                    <a href="https://wa.me/5592985589868" target="_blank" class="icon-metal">
                        <i class="fab fa-whatsapp"></i>
                    </a>
                    <a href="https://wa.me/5592993507377" target="_blank" class="icon-metal">
                        <i class="fab fa-whatsapp"></i>
                    </a>
                </div>

                <div class="social-info">
                    <div class="info-row">
                        <i class="fab fa-instagram" style="color: #ccc;"></i> <span>@4l_teamjj</span>
                    </div>
                    <div class="info-row">
                        <i class="fab fa-whatsapp" style="color: #25D366;"></i> <span>92 98558-9868 - Luane</span>
                    </div>
                    <div class="info-row">
                        <i class="fab fa-whatsapp" style="color: #25D366;"></i> <span>92 99350-7377 - Luan</span>
                    </div>
                </div>
            </div>

        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <script src="supabase-config.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <script src="app.js"></script>
</body>
</html>
