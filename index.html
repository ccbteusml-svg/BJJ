<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>4L Academy - Login</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000000">
    
    <link rel="stylesheet" href="style.css?v=10">
</head>
<body>

    <div class="banner-topo"></div>

    <div class="login-container">
        <h1 style="font-style: italic;">4L <span style="color: #E53935;">ACADEMY</span></h1>
        <p class="subtitulo" style="font-size: 11px;">Jiu-Jitsu</p>
        
        <form id="form-login">
            

            <p style="margin-top: 20px; font-size: 13px; color: #aaaaaa;">
    Não tem uma conta? <a href="cadastro.html" style="color: var(--cor-destaque); text-decoration: none; font-weight: bold;">Cadastre-se aqui</a>
</p>

            <input type="email" id="email" placeholder="Seu E-mail" required>
            <input type="password" id="senha" placeholder="Sua Senha" required>
            <button type="submit">Entrar</button>
            <p id="msg-erro" style="color: #E53935; margin-top: 15px; font-size: 14px; font-weight: bold; height: 20px;"></p>
            <p id="btn-esqueci-senha" style="margin-top: 15px; font-size: 13px; color: var(--cor-destaque); cursor: pointer; font-weight: bold;">
    Esqueci minha senha
</p>

        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <script src="app.js"></script>
</body>
</html>
